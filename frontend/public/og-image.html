<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
    }
    
    /* Background Pattern */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 50%, rgba(124, 108, 250, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(0, 212, 255, 0.15) 0%, transparent 50%);
      z-index: 1;
    }
    
    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 60px;
    }
    
    .logo {
      margin-bottom: 40px;
      display: inline-block;
    }
    
    .logo svg {
      width: 120px;
      height: 120px;
      filter: drop-shadow(0 10px 30px rgba(124, 108, 250, 0.5));
    }
    
    h1 {
      font-size: 80px;
      font-weight: 900;
      background: linear-gradient(135deg, #7c6cfa 0%, #00d4ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      letter-spacing: -2px;
      text-shadow: 0 0 80px rgba(124, 108, 250, 0.3);
    }
    
    .subtitle {
      font-size: 32px;
      color: #94a3b8;
      font-weight: 500;
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }
    
    .tools-count {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(124, 108, 250, 0.1);
      border: 2px solid rgba(124, 108, 250, 0.3);
      padding: 16px 32px;
      border-radius: 50px;
      font-size: 24px;
      color: #e2e8f0;
      font-weight: 600;
    }
    
    .tools-count span {
      color: #00d4ff;
      font-size: 32px;
      font-weight: 800;
    }
    
    /* Decorative Elements */
    .circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
    }
    
    .circle-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #7c6cfa, #00d4ff);
      top: -200px;
      right: -200px;
      filter: blur(80px);
    }
    
    .circle-2 {
      width: 300px;
      height: 300px;
      background: linear-gradient(135deg, #00d4ff, #7c6cfa);
      bottom: -150px;
      left: -150px;
      filter: blur(60px);
    }
  </style>
</head>
<body>
  <div class="circle circle-1"></div>
  <div class="circle circle-2"></div>
  
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7c6cfa;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
          </linearGradient>
        </defs>
        
        <!-- Code Brackets with Tool -->
        <path d="M 60 60 L 40 100 L 60 140" stroke="url(#gradient)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 140 60 L 160 100 L 140 140" stroke="url(#gradient)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        
        <!-- Wrench Tool -->
        <g transform="translate(100, 100)">
          <circle cx="0" cy="-25" r="12" fill="url(#gradient)"/>
          <rect x="-6" y="-25" width="12" height="50" rx="3" fill="url(#gradient)"/>
          <path d="M -12 20 L 12 20 L 8 30 L -8 30 Z" fill="url(#gradient)"/>
        </g>
      </svg>
    </div>
    
    <h1>Toolvy</h1>
    <div class="subtitle">Professional Developer & PDF Tools</div>
    <div class="tools-count">
      <span>36+</span> Free Online Tools
    </div>
  </div>
</body>
</html>
